<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexgen Showcase Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; margin: 0; padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; }
        .brand-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px dashed #e2e8f0; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; text-transform: uppercase; margin: 0 0 5px 0; }
        .sub-header { font-size: 1rem; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; }
        
        #carousel-container { width: 100%; height: 300px; overflow: hidden; margin-bottom: 40px; border-radius: 8px; background: #f8fafc; position: relative; }
        .carousel-track { display: flex; height: 100%; transition: transform 0.8s ease-in-out; }
        .carousel-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .album-navigation { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .tab-btn { background: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 6px 16px; border-radius: 20px; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #000000; color: #ffffff; border-color: #000000; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .media-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .media-display-wrap { height: 240px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .media-display-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1>NEXGEN PRODUCTIONS</h1>
        <div class="sub-header">QUALITY MEDIA SOLUTIONS</div>
    </div>

    <div id="carousel-container">
        <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="album-navigation" id="album-nav-row"></div>
    <div class="portfolio-grid" id="showcase-target-grid"></div>
</div>

<script>
    // Configuration
    const GITHUB_USER = 'nexgenproductions868-glitch';
    const REPO_NAME = 'Nexgen-media';
    const GITHUB_TOKEN = process.env.GITHUB_TOKEN; 

    let portfolioItems = [];
    let albumRegistry = [{ id: 'master', label: 'ALL ALBUMS' }];

    async function fetchGitHubContent() {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const albums = await response.json();
        
        for (const album of albums) {
            if (album.type === 'dir') {
                albumRegistry.push({ id: album.name, label: album.name.replace('_', ' ') });
                const images = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums/${album.name}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const files = await images.json();
                files.forEach(file => {
                    portfolioItems.push({ title: file.name, album: album.name, src: file.download_url });
                });
            }
        }
        renderApp();
    }

    function renderApp() {
        const nav = document.getElementById('album-nav-row');
        nav.innerHTML = '';
        albumRegistry.forEach(album => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = album.label;
            btn.onclick = () => renderGrid(album.id);
            nav.appendChild(btn);
        });
        renderGrid('master');
        updateCarousel();
    }

    function renderGrid(albumId) {
        const grid = document.getElementById('showcase-target-grid');
        grid.innerHTML = '';
        const filtered = albumId === 'master' ? portfolioItems : portfolioItems.filter(i => i.album === albumId);
        filtered.forEach(item => {
            grid.innerHTML += `<div class="media-card"><div class="media-display-wrap"><img src="${item.src}" alt="${item.title}"></div></div>`;
        });
    }

    function updateCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = portfolioItems.map(item => `<div class="carousel-slide"><img src="${item.src}"></div>`).join('');
    }

    fetchGitHubContent();
</script>
</body>
</html>
