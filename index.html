<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Nexgen Showcase Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; margin: 0; padding: 25px 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Premium Tight Letterhead Branding Area */
        .brand-header { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px dashed #e2e8f0; }
        .brand-logo-wrap { width: 220px; max-width: 85%; height: auto; margin-bottom: 5px; display: block; }
        .brand-logo-wrap img { width: 100%; height: auto; display: block; object-fit: contain; }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; text-transform: uppercase; margin: 0 0 2px 0; letter-spacing: 0.04em; }
        .sub-header { font-size: 0.85rem; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; user-select: none; }
        .contact-info { font-size: 0.9rem; font-weight: bold; color: #000000; margin-bottom: 10px; }
        
        /* Upgraded Filmstrip Carousel - No Clipping, Auto-Aspect Sizing */
        #carousel-container { width: 100%; height: 260px; overflow: hidden; margin-bottom: 40px; position: relative; background: transparent; }
        .carousel-track { display: flex; gap: 14px; height: 100%; transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); width: max-content; }
        
        /* Allows slides to scale contextually to the image width instead of rigid boxes */
        .carousel-slide { height: 100%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .carousel-slide img { height: 100%; width: auto; object-fit: contain; border-radius: 6px; }

        /* Navigation Album Tabs */
        .album-navigation { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; }
        .tab-btn { background: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 500; cursor: pointer; white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.2s ease; }
        .tab-btn.active { background: #000000; color: #ffffff; border-color: #000000; }

        /* Grid */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .media-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #ffffff; cursor: pointer; transition: transform 0.2s ease; }
        .media-card:hover { transform: translateY(-2px); }
        .media-display-wrap { height: 240px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; box-sizing: border-box; }
        .media-display-wrap img { max-width: 100%; max-height: 100%; width: auto; height: auto; display: block; object-fit: contain; }
        
        /* Lightbox Modals - Opacity Dialed Down to 0.40 Transparency */
        .photo-viewer-lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.40); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
        .photo-viewer-lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content-frame { max-width: 95%; max-height: 85%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .lightbox-content-frame img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 4px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); user-select: none; }
        
        /* Lightbox UI Navigation Arrows - Recalibrated Contrast for Bright Environments */
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(15, 23, 42, 0.06); color: #0f172a; border: 1px solid rgba(15, 23, 42, 0.12); font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; user-select: none; transition: all 0.2s ease; z-index: 2100; }
        .lightbox-arrow:hover { background: #0f172a; color: #ffffff; }
        .arrow-left { left: -70px; }
        .arrow-right { right: -70px; }

        @media (max-width: 1100px) {
            .lightbox-content-frame { max-width: 80%; }
            .arrow-left { left: 20px; position: fixed; }
            .arrow-right { right: 20px; position: fixed; }
        }
        
        .loading-text { text-align: center; font-family: 'Inter', sans-serif; color: #64748b; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div id="brand-logo-slot" class="brand-logo-wrap">
            <img id="brand-img" src="website-logo/logo.png" alt="Branding Logo" onerror="this.parentElement.style.display='none';">
        </div>
        <h1>NEXGEN PRODUCTIONS</h1>
        <div class="sub-header">QUALITY MEDIA SOLUTIONS</div>
        <div class="contact-info">326-9582</div>
    </div>

    <div id="carousel-container">
        <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="album-navigation" id="album-nav-row"></div>
    <div class="portfolio-grid" id="showcase-target-grid"><div class="loading-text">Loading Portfolio...</div></div>
</div>

<div class="photo-viewer-lightbox" id="lightbox-overlay-frame" onclick="closeLargePhotoViewer()">
    <div class="lightbox-content-frame" onclick="event.stopPropagation()">
        <button type="button" class="lightbox-arrow arrow-left" onclick="changeLightboxImage(-1, event)">&#10094;</button>
        <img id="lightbox-target-img" src="" alt="Expanded View">
        <button type="button" class="lightbox-arrow arrow-right" onclick="changeLightboxImage(1, event)">&#10095;</button>
    </div>
</div>

<script>
    const GITHUB_USER = 'nexgenproductions868-glitch';
    const REPO_NAME = 'Nexgen-media';
    
    let portfolioItems = [];
    let albumRegistry = [{ id: 'master', label: 'NEXGEN SELECTS' }];
    let selectedActiveTab = 'master';
    let currentSlide = 0;
    let currentLightboxIndex = 0;
    
    let touchStartX = 0;
    let touchEndX = 0;

    async function fetchGitHubData() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const requestedAlbum = urlParams.get('album');

            const cachedPortfolio = sessionStorage.getItem('nexgen_portfolio_items');
            const cachedRegistry = sessionStorage.getItem('nexgen_album_registry');

            if (cachedPortfolio && cachedRegistry) {
                portfolioItems = JSON.parse(cachedPortfolio);
                albumRegistry = JSON.parse(cachedRegistry);
            } else {
                const folderRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums`);
                if (!folderRes.ok) throw new Error("Could not reach GitHub");
                const folders = await folderRes.json();

                for (const folder of folders) {
                    if (folder.type === 'dir') {
                        if (folder.name === 'website-logo') continue;

                        const cleanName = folder.name.replace(/-/g, ' ').toUpperCase();
                        albumRegistry.push({ id: folder.name, label: cleanName });
                        
                        const imgRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums/${folder.name}`);
                        const files = await imgRes.json();
                        
                        files.forEach(file => {
                            if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
                                portfolioItems.push({ 
                                    title: file.name, 
                                    album: folder.name, 
                                    src: file.download_url 
                                });
                            }
                        });
                    }
                }
                
                sessionStorage.setItem('nexgen_portfolio_items', JSON.stringify(portfolioItems));
                sessionStorage.setItem('nexgen_album_registry', JSON.stringify(albumRegistry));
            }

            if (requestedAlbum && albumRegistry.some(a => a.id === requestedAlbum)) {
                selectedActiveTab = requestedAlbum;
            }

            renderApp();
        } catch (error) {
            document.getElementById('showcase-target-grid').innerHTML = '<div class="loading-text">Error loading images. Please ensure albums folder exists on GitHub.</div>';
        }
    }

    function renderApp() {
        renderTabNavigation();
        renderPortfolioGrid();
        updateCarousel();
        setInterval(autoRotateCarousel, 4000);
        initializeGestureListeners();
    }

    function renderTabNavigation() {
        const row = document.getElementById('album-nav-row');
        row.innerHTML = '';
        albumRegistry.forEach(album => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${selectedActiveTab === album.id ? 'active' : ''}`;
            btn.textContent = album.label;
            btn.onclick = () => { 
                selectedActiveTab = album.id; 
                renderTabNavigation(); 
                renderPortfolioGrid(); 
            };
            row.appendChild(btn);
        });
    }

    function getFilteredItems() {
        return selectedActiveTab === 'master' ? portfolioItems : portfolioItems.filter(i => i.album === selectedActiveTab);
    }

    function renderPortfolioGrid() {
        const grid = document.getElementById('showcase-target-grid');
        grid.innerHTML = '';
        const filtered = getFilteredItems();
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="loading-text">No images found in this album.</div>';
            return;
        }

        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.onclick = () => openLargePhotoViewer(index);
            card.innerHTML = `<div class="media-display-wrap"><img src="${item.src}" loading="lazy" alt="Portfolio Image"></div>`;
            grid.appendChild(card);
        });
    }

    function updateCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = '';
        portfolioItems.forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `<img src="${item.src}" loading="lazy" alt="Carousel Image">`;
            track.appendChild(slide);
        });
    }

    /* Measures exact pixel offsets dynamically to prevent gaps or clipping */
    function autoRotateCarousel() {
        const track = document.getElementById('carousel-track');
        const container = document.getElementById('carousel-container');
        if (!track || !container || track.children.length === 0) return;
        
        currentSlide++;
        if (currentSlide >= track.children.length) {
            currentSlide = 0;
        }
        
        let targetSlide = track.children[currentSlide];
        let offsetPosition = targetSlide.offsetLeft;
        const maxScrollLimit = track.scrollWidth - container.clientWidth;
        
        // Loop seamlessly if the offset pushes past the physical content width
        if (offsetPosition > maxScrollLimit) {
            currentSlide = 0;
            targetSlide = track.children[currentSlide];
            offsetPosition = targetSlide.offsetLeft;
        }
        
        track.style.transform = `translateX(-${offsetPosition}px)`;
    }

    function openLargePhotoViewer(index) {
        currentLightboxIndex = index;
        const filtered = getFilteredItems();
        if (!filtered[index]) return;
        
        document.getElementById('lightbox-target-img').src = filtered[index].src;
        document.getElementById('lightbox-overlay-frame').classList.add('active');
    }
    
    function changeLightboxImage(direction, event) {
        if (event) event.stopPropagation();
        const filtered = getFilteredItems();
        if (filtered.length === 0) return;
        
        currentLightboxIndex = (currentLightboxIndex + direction + filtered.length) % filtered.length;
        document.getElementById('lightbox-target-img').src = filtered[currentLightboxIndex].src;
    }

    function closeLargePhotoViewer() { 
        document.getElementById('lightbox-overlay-frame').classList.remove('active'); 
    }

    function initializeGestureListeners() {
        const lightboxFrame = document.getElementById('lightbox-overlay-frame');
        
        lightboxFrame.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        lightboxFrame.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        document.addEventListener('keydown', (e) => {
            if (!lightboxFrame.classList.contains('active')) return;
            if (e.key === 'ArrowRight') changeLightboxImage(1);
            if (e.key === 'ArrowLeft') changeLightboxImage(-1);
            if (e.key === 'Escape') closeLargePhotoViewer();
        });
    }

    function handleSwipeGesture() {
        const swipeThreshold = 50; 
        if (touchStartX - touchEndX > swipeThreshold) {
            changeLightboxImage(1);
        } else if (touchEndX - touchStartX > swipeThreshold) {
            changeLightboxImage(-1);
        }
    }
    fetchGitHubData();
</script>
</body>
</html>
