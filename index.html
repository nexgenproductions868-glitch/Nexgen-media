<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Nexgen Showcase Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; margin: 0; padding: 25px 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .brand-header { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px dashed #e2e8f0; }
        .brand-logo-wrap { width: 220px; max-width: 85%; height: auto; margin-bottom: 5px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; text-transform: uppercase; margin: 0 0 2px 0; letter-spacing: 0.04em; }
        .sub-header { font-size: 0.85rem; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
        .contact-info { font-size: 0.9rem; font-weight: bold; color: #000000; margin-bottom: 10px; }
        
        #carousel-container { width: 100%; height: 260px; overflow: hidden; margin-bottom: 40px; position: relative; background: transparent; }
        .carousel-track { display: flex; gap: 14px; height: 100%; transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); width: max-content; }
        .carousel-slide { height: 100%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
        .carousel-slide img { height: 100%; width: auto; object-fit: contain; border-radius: 6px; }

        .album-navigation { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .tab-btn { background: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #000000; color: #ffffff; border-color: #000000; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .media-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #ffffff; cursor: pointer; }
        .media-display-wrap { height: 240px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .media-display-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .photo-viewer-lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.40); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.25s; }
        .photo-viewer-lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content-frame { max-width: 95%; max-height: 85%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .lightbox-content-frame img { max-width: 100%; max-height: 80vh; border-radius: 4px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(15, 23, 42, 0.06); color: #0f172a; border: 1px solid rgba(15, 23, 42, 0.12); font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; z-index: 2100; }
        .arrow-left { left: -70px; }
        .arrow-right { right: -70px; }
        @media (max-width: 1100px) { .arrow-left { left: 20px; position: fixed; } .arrow-right { right: 20px; position: fixed; } }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1>NEXGEN PRODUCTIONS</h1>
        <div class="sub-header">QUALITY MEDIA SOLUTIONS</div>
        <div class="contact-info">326-9582</div>
    </div>

    <div id="carousel-container">
        <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="album-navigation" id="album-nav-row"></div>
    <div class="portfolio-grid" id="showcase-target-grid"></div>
</div>

<div class="photo-viewer-lightbox" id="lightbox-overlay-frame" onclick="closeLargePhotoViewer()">
    <div class="lightbox-content-frame" onclick="event.stopPropagation()">
        <button type="button" class="lightbox-arrow arrow-left" onclick="changeLightboxImage(-1, event)">&#10094;</button>
        <img id="lightbox-target-img" src="" alt="View">
        <button type="button" class="lightbox-arrow arrow-right" onclick="changeLightboxImage(1, event)">&#10095;</button>
    </div>
</div>

<script>
    const GITHUB_USER = 'nexgenproductions868-glitch';
    const REPO_NAME = 'Nexgen-media';
    let portfolioItems = [];
    let albumRegistry = [{ id: 'master', label: 'NEXGEN SELECTS' }];
    let selectedActiveTab = 'master';
    let currentLightboxIndex = 0;
    let currentSlide = 0;

    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    async function fetchGitHubData() {
        try {
            const folderRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums`);
            const folders = await folderRes.json();
            for (const folder of folders) {
                if (folder.type === 'dir' && folder.name !== 'website-logo') {
                    albumRegistry.push({ id: folder.name, label: folder.name.replace(/-/g, ' ').toUpperCase() });
                    const imgRes = await fetch(folder.url);
                    const files = await imgRes.json();
                    files.forEach(file => {
                        if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
                            portfolioItems.push({ album: folder.name, src: file.download_url });
                        }
                    });
                }
            }
            renderApp();
        } catch (e) { console.error(e); }
    }

    function getFilteredItems() {
        const items = selectedActiveTab === 'master' ? portfolioItems : portfolioItems.filter(i => i.album === selectedActiveTab);
        return shuffleArray([...items]);
    }

    function renderApp() {
        renderTabNavigation();
        renderPortfolioGrid();
        updateCarousel();
        setInterval(autoRotateCarousel, 4000);
    }

    function renderTabNavigation() {
        const row = document.getElementById('album-nav-row');
        row.innerHTML = '';
        albumRegistry.forEach(album => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${selectedActiveTab === album.id ? 'active' : ''}`;
            btn.textContent = album.label;
            btn.onclick = () => { selectedActiveTab = album.id; renderApp(); };
            row.appendChild(btn);
        });
    }

    function renderPortfolioGrid() {
        const grid = document.getElementById('showcase-target-grid');
        grid.innerHTML = '';
        const items = getFilteredItems();
        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.onclick = () => openLargePhotoViewer(index, items);
            card.innerHTML = `<div class="media-display-wrap"><img src="${item.src}" loading="lazy"></div>`;
            grid.appendChild(card);
        });
    }

    function updateCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = '';
        shuffleArray([...portfolioItems]).forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `<img src="${item.src}" loading="lazy">`;
            track.appendChild(slide);
        });
    }

    function autoRotateCarousel() {
        const track = document.getElementById('carousel-track');
        const container = document.getElementById('carousel-container');
        if (!track || track.children.length === 0) return;
        
        currentSlide = (currentSlide + 1) % track.children.length;
        const slideWidth = track.children[0].offsetWidth + 14; 
        track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;
    }

    let currentGallery = [];
    function openLargePhotoViewer(index, gallery) {
        currentLightboxIndex = index;
        currentGallery = gallery;
        document.getElementById('lightbox-target-img').src = currentGallery[index].src;
        document.getElementById('lightbox-overlay-frame').classList.add('active');
    }
    
    function changeLightboxImage(direction, event) {
        if (event) event.stopPropagation();
        currentLightboxIndex = (currentLightboxIndex + direction + currentGallery.length) % currentGallery.length;
        document.getElementById('lightbox-target-img').src = currentGallery[currentLightboxIndex].src;
    }

    function closeLargePhotoViewer() { document.getElementById('lightbox-overlay-frame').classList.remove('active'); }

    fetchGitHubData();
</script>
</body>
</html>
