        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; margin: 0; padding: 25px 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .brand-header { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-bottom: 30px; padding-bottom: 15px; }
        .brand-logo-wrap { width: 220px; max-width: 85%; height: auto; margin-bottom: 5px; }
        .brand-logo-wrap img { width: 100%; height: auto; display: block; object-fit: contain; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; text-transform: uppercase; margin: 0 0 2px 0; letter-spacing: 0.04em; }
        .sub-header { font-size: 0.85rem; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
        .contact-info { font-size: 0.9rem; font-weight: bold; color: #000000; margin-bottom: 10px; }
        
        #carousel-container { width: 100%; height: 260px; overflow: hidden; margin-bottom: 40px; position: relative; background: transparent; transition: all 0.3s ease; }
        
        #carousel-container.fullscreen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: rgba(255, 255, 255, 0.98); 
            z-index: 1900; 
            margin: 0; 
            padding: 0;
            display: flex;
            align-items: center;
        }

        .carousel-fullscreen-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #000000;
            color: #000000;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1950;
            transition: all 0.2s ease;
        }
        .carousel-fullscreen-btn:hover { background: #000000; color: #ffffff; }
        .carousel-fullscreen-btn svg { width: 14px; height: 14px; display: block; }

        .carousel-track { display: flex; gap: 14px; height: 100%; transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); width: max-content; }
        .carousel-slide { height: 100%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
        .carousel-slide img { height: 100%; width: auto; object-fit: contain; border-radius: 6px; }

        .album-navigation { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; justify-content: center; align-items: center; }
        .tab-btn { 
            background: transparent; color: #000000; border: 1px solid #000000; padding: 8px 20px; 
            border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 0.85rem; 
            font-weight: 700; cursor: pointer; white-space: nowrap; text-transform: uppercase; 
            letter-spacing: 0.06em; transition: all 0.2s ease; 
        }
        .tab-btn.active { background: #000000; color: #ffffff; border-color: #000000; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        
        .media-card { cursor: pointer; transition: opacity 0.2s; }
        .media-card:hover { opacity: 0.8; }
        
        .media-display-wrap { height: 240px; display: flex; align-items: center; justify-content: center; }
        .media-display-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
        
        .photo-viewer-lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.40); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.25s; }
        .photo-viewer-lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content-frame { max-width: 95%; max-height: 85%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .lightbox-content-frame img { max-width: 100%; max-height: 80vh; border-radius: 4px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(15, 23, 42, 0.06); color: #0f172a; border: 1px solid rgba(15, 23, 42, 0.12); font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; z-index: 2100; }
        .arrow-left { left: -70px; }
        .arrow-right { right: -70px; }
        @media (max-width: 1100px) { .arrow-left { left: 20px; position: fixed; } .arrow-right { right: 20px; position: fixed; } }
    </style>

<div class="container">
    <div class="brand-header">
        <div class="brand-logo-wrap">
            <img src="website-logo/logo.png" alt="Nexgen Logo" onerror="this.parentElement.style.display='none';">
        </div>
        <h1>NEXGEN PRODUCTIONS</h1>
        <div class="sub-header">QUALITY MEDIA SOLUTIONS</div>
        <div class="contact-info">326-9582</div>
    </div>

    <div id="carousel-container">
        <button id="carousel-fullscreen-btn" class="carousel-fullscreen-btn" onclick="toggleCarouselFullscreen()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="album-navigation" id="album-nav-row"></div>
    <div class="portfolio-grid" id="showcase-target-grid"></div>
</div>

<div class="photo-viewer-lightbox" id="lightbox-overlay-frame" onclick="closeLargePhotoViewer()">
    <div class="lightbox-content-frame" onclick="event.stopPropagation()">
        <button type="button" class="lightbox-arrow arrow-left" onclick="changeLightboxImage(-1, event)">&#10094;</button>
        <img id="lightbox-target-img" src="" alt="View">
        <button type="button" class="lightbox-arrow arrow-right" onclick="changeLightboxImage(1, event)">&#10095;</button>
    </div>
</div>

<script>
    const GITHUB_USER = 'nexgenproductions868-glitch';
    const REPO_NAME = 'Nexgen-media';
    let portfolioItems = [];
    let albumRegistry = [{ id: 'master', label: 'NEXGEN SELECTS' }];
    let selectedActiveTab = 'master';
    let currentLightboxIndex = 0;
    let autoRotateInterval;

    const SVG_EXPAND = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
    const SVG_COLLAPSE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"/></svg>`;

    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    async function fetchGitHubData() {
        try {
            const folderRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums`);
            let folders = await folderRes.json();
            
            if (!Array.isArray(folders)) {
                console.error("GitHub API response error or target rate limit hit:", folders);
                return;
            }

            // Fixed: Force alphanumeric sorting on the folder list so Tab 9 sits cleanly in front of Tab 10
            folders = folders.filter(f => f.type === 'dir' && f.name !== 'website-logo');
            folders.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

            for (const folder of folders) {
                albumRegistry.push({ id: folder.name, label: folder.name.replace(/-/g, ' ').toUpperCase() });
                const imgRes = await fetch(folder.url);
                const files = await imgRes.json();
                
                if (Array.isArray(files)) {
                    files.forEach(file => {
                        if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
                            portfolioItems.push({ album: folder.name, src: file.download_url, name: file.name });
                        }
                    });
                }
            }
            
            updateCarousel();
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            autoRotateInterval = setInterval(autoRotateCarousel, 10000);

            renderApp();
        } catch (e) { console.error(e); }
    }

    function getFilteredItems() {
        const items = selectedActiveTab === 'master' ? portfolioItems : portfolioItems.filter(i => i.album === selectedActiveTab);
        return [...items];
    }

    function renderApp() {
        renderTabNavigation();
        renderPortfolioGrid();
    }

    function renderTabNavigation() {
        const row = document.getElementById('album-nav-row');
        row.innerHTML = '';
        albumRegistry.forEach(album => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${selectedActiveTab === album.id ? 'active' : ''}`;
            btn.textContent = album.label;
            btn.onclick = () => { selectedActiveTab = album.id; renderApp(); };
            row.appendChild(btn);
        });
    }

    function renderPortfolioGrid() {
        const grid = document.getElementById('showcase-target-grid');
        grid.innerHTML = '';
        
        let items = getFilteredItems();
        
        // Fixed: Conditional sort split architecture
        if (selectedActiveTab === 'master') {
            // Keep Master Grid randomly shuffled exactly how you wanted it
            items = shuffleArray(items);
        } else {
            // Inside individual albums, organize files strictly in sequential numeric/alphanumeric order
            items.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
        }

        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.onclick = () => openLargePhotoViewer(index, items);
            card.innerHTML = `<div class="media-display-wrap"><img src="${item.src}" loading="lazy"></div>`;
            grid.appendChild(card);
        });
    }

    // Dynamic top carousel remains randomized via original shuffle engine
    function updateCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = '';
        shuffleArray([...portfolioItems]).forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `<img src="${item.src}" loading="eager">`;
            track.appendChild(slide);
        });
    }

    function autoRotateCarousel() {
        const track = document.getElementById('carousel-track');
        if (!track || track.children.length === 0) return;
        
        const firstChild = track.children[0];
        const slideWidth = firstChild.offsetWidth + 14; 
        
        track.style.transition = 'transform 0.7s cubic-bezier(0.25, 1, 0.5, 1)';
        track.style.transform = `translateX(-${slideWidth}px)`;
        
        setTimeout(() => {
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            track.removeChild(firstChild);
            
            if (portfolioItems.length > 0) {
                const randomItem = portfolioItems[Math.floor(Math.random() * portfolioItems.length)];
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `<img src="${randomItem.src}" loading="eager">`;
                track.appendChild(slide);
            }
        }, 700);
    }

    function toggleCarouselFullscreen() {
        const container = document.getElementById('carousel-container');
        const btn = document.getElementById('carousel-fullscreen-btn');
        container.classList.toggle('fullscreen');
        
        if (container.classList.contains('fullscreen')) {
            btn.innerHTML = SVG_COLLAPSE;
            document.body.style.overflow = 'hidden'; 
        } else {
            btn.innerHTML = SVG_EXPAND;
            document.body.style.overflow = ''; 
        }
    }

    let currentGallery = [];
    function openLargePhotoViewer(index, gallery) {
        currentLightboxIndex = index;
        currentGallery = gallery;
        document.getElementById('lightbox-target-img').src = currentGallery[index].src;
        document.getElementById('lightbox-overlay-frame').classList.add('active');
    }
    
    function changeLightboxImage(direction, event) {
        if (event) event.stopPropagation();
        currentLightboxIndex = (currentLightboxIndex + direction + currentGallery.length) % currentGallery.length;
        document.getElementById('lightbox-target-img').src = currentGallery[currentLightboxIndex].src;
    }

    function closeLargePhotoViewer() { document.getElementById('lightbox-overlay-frame').classList.remove('active'); }

    fetchGitHubData();
</script>
</body>

                track.appendChild(slide);
            }
        }, 700);
    }

    function toggleCarouselFullscreen() {
        const container = document.getElementById('carousel-container');
        const btn = document.getElementById('carousel-fullscreen-btn');
        container.classList.toggle('fullscreen');
        
        if (container.classList.contains('fullscreen')) {
            btn.innerHTML = SVG_COLLAPSE;
            document.body.style.overflow = 'hidden'; 
        } else {
            btn.innerHTML = SVG_EXPAND;
            document.body.style.overflow = ''; 
        }
    }

    let currentGallery = [];
    function openLargePhotoViewer(index, gallery) {
        currentLightboxIndex = index;
        currentGallery = gallery;
        document.getElementById('lightbox-target-img').src = currentGallery[index].src;
        document.getElementById('lightbox-overlay-frame').classList.add('active');
    }
    
    function changeLightboxImage(direction, event) {
        if (event) event.stopPropagation();
        currentLightboxIndex = (currentLightboxIndex + direction + currentGallery.length) % currentGallery.length;
        document.getElementById('lightbox-target-img').src = currentGallery[currentLightboxIndex].src;
    }

    function closeLargePhotoViewer() { document.getElementById('lightbox-overlay-frame').classList.remove('active'); }

    fetchGitHubData();
</script>
</body>
</html>
