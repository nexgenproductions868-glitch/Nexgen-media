<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexgen Media</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #admin-nav { padding: 15px; background: #f8f8f8; border-bottom: 2px solid #ddd; margin-bottom: 20px; display: none; }
        #logo-container { text-align: center; margin: 30px 0; }
        #logo-container img { max-width: 250px; }
        #nav { display: flex; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: 1px solid #333; background: white; }
        .tab-btn.active { background: black; color: white; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .media-card img { width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="admin-nav">
        <strong>Admin Tools:</strong>
        <button onclick="window.location.href='https://nexgen-media.vercel.app/'">View Client-Side Gallery</button>
        <button onclick="window.open('https://vercel.com/dashboard', '_blank')">Open Vercel Dashboard</button>
    </div>

    <div id="logo-container"></div>
    <div id="nav"></div>
    <div id="grid" class="portfolio-grid"></div>

<script>
    const GITHUB_USER = 'nexgenproductions868-glitch';
    const REPO_NAME = 'Nexgen-media';
    const GITHUB_TOKEN = process.env.GITHUB_TOKEN; // Injected by Vercel

    // Set to true to see Admin Bar, false to hide from public
    const isAdmin = true; 
    if (isAdmin) document.getElementById('admin-nav').style.display = 'block';

    async function loadGallery() {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const items = await res.json();
        
        for (const item of items) {
            if (item.type === 'dir') {
                if (item.name.toLowerCase() === 'website logo') {
                    fetchLogo(item.name);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.textContent = item.name;
                    btn.onclick = () => fetchImages(item.name);
                    document.getElementById('nav').appendChild(btn);
                }
            }
        }
    }

    async function fetchLogo(folderName) {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums/${folderName}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const files = await res.json();
        if (files.length > 0) {
            document.getElementById('logo-container').innerHTML = `<img src="${files[0].download_url}" alt="Logo">`;
        }
    }

    async function fetchImages(albumName) {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/albums/${albumName}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const files = await res.json();
        const grid = document.getElementById('grid');
        grid.innerHTML = files.map(f => `<div class="media-card"><img src="${f.download_url}"></div>`).join('');
    }

    loadGallery();
</script>
</body>
</html>
